<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>東京高専時間割('26前期)</title>
    <link rel="stylesheet" href="style.css?v=3">
    
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>
    <header>
        <h1>高専スケジュール</h1>
        <button id="menu-btn" class="hamburger-btn">☰</button>
    </header>

    
    <div id="settings-modal" class="modal">
        <div class="modal-content card">
            <span id="close-modal" class="close-btn">&times;</span>
            <h2>クラス設定</h2>
            <div class="setting-group">
                <label for="main-class">マイクラス (メイン):</label>
                <select id="main-class">
                    <option value="">選択してください</option>
                </select>
            </div>

            <div class="setting-group">
                <label>サブクラス (最大3つ):</label>
                <div id="sub-classes-container">
                    <select class="sub-class">
                        <option value="">選択してください</option>
                    </select>
                    <select class="sub-class">
                        <option value="">選択してください</option>
                    </select>
                    <select class="sub-class">
                        <option value="">選択してください</option>
                    </select>
                </div>
            </div>
            <button id="save-settings" class="btn">設定を保存</button>
            <span id="save-msg" style="display:none; color: green; margin-left: 10px;">保存しました！</span>
        </div>
    </div>

    <main>
        
        <div class="view-toggle" id="view-toggle" style="display:none;">
            <button id="btn-today-view" class="toggle-btn active">本日の時間割</button>
            <button id="btn-weekly-view" class="toggle-btn">週間一覧表示</button>
        </div>

        
        <section id="today-section" class="card" style="display:none;">
            <h2 id="today-title">〇曜日の時間割</h2>
            <div class="table-container">
                <table id="today-timetable">
                    <thead>
                        <tr id="today-header-row">
                            
                        </tr>
                    </thead>
                    <tbody id="today-body">
                        
                    </tbody>
                </table>
            </div>
            <p id="today-no-class-msg" style="display:none; text-align:center; padding: 1rem; color: #666;">
                本日の授業はありません。（休日）
            </p>
        </section>

        
        <section id="timetable-section" class="card" style="display:none;">
            
            <ul id="class-tabs" class="tabs">
                
            </ul>

            
            <div class="table-container">
                <table id="timetable">
                    <thead>
                        <tr>
                            <th>時限</th>
                            <th>月</th>
                            <th>火</th>
                            <th>水</th>
                            <th>木</th>
                            <th>金</th>
                        </tr>
                    </thead>
                    <tbody>
                        
                    </tbody>
                </table>
            </div>
        </section>

        
        <section class="card">
            <h2>便利リンク一覧</h2>
            <ul class="quick-links">
                <li><a href="https://syllabus.kosen-k.go.jp/Pages/PublicDepartments?school_id=15&lang=ja"
                        target="_blank">Webシラバス</a></li>
                <li><a href="https://new.chunithm-net.com/" target="_blank">CHUNITHM-NET</a></li>
                <li><a href="https://wikiwiki.jp/chunithmwiki/" target="_blank">CHUNITHM Wiki</a></li>
                <li><a href="https://maimaidx.jp/" target="_blank">maimai-NET</a></li>
            </ul>
        </section>
    </main>

    
    <script src="app.js?v=2"></script>
</body>

</html>
